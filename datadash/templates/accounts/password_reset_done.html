{% extends "base.html" %}
{% block title %}Check Your Email{% endblock %}
{% block body_class %}auth-body{% endblock %}
{% block auth_content %}
<div class="auth-wrapper centered">
  <div class="auth-card text-center">
    <div class="auth-icon-circle success"><i class="bi bi-envelope-check"></i></div>
    <h2 class="auth-title">Check your inbox</h2>
    <p class="auth-subtitle">We've sent a password reset link to your email address. It expires in 24 hours.</p>
    <p class="auth-footer"><a href="{% url 'login' %}"><i class="bi bi-arrow-left"></i> Back to Sign In</a></p>
  </div>
</div>
{% endblock %}
