{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}
{% block body_class %}auth-body{% endblock %}
{% block auth_content %}
<div class="auth-wrapper centered">
  <div class="auth-card">
    <div class="auth-brand">
      <div class="brand-icon-lg">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none"><rect width="40" height="40" rx="12" fill="url(#lg3)"/>
        <path d="M10 14h20M10 20h13M10 26h16" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        <defs><linearGradient id="lg3" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
          <stop stop-color="#6366f1"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient></defs></svg>
      </div>
      <h1 class="auth-brand-name">DataDash</h1>
    </div>
    <div class="auth-icon-circle"><i class="bi bi-envelope-at"></i></div>
    <h2 class="auth-title">Forgot your password?</h2>
    <p class="auth-subtitle">Enter your email and we'll send you a reset link.</p>
    <form method="post" class="auth-form">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Email address</label>
        <div class="input-icon-wrap">
          <i class="bi bi-envelope input-icon"></i>
          {{ form.email }}
        </div>
      </div>
      <button type="submit" class="btn-auth">Send Reset Link <i class="bi bi-send"></i></button>
    </form>
    <p class="auth-footer"><a href="{% url 'login' %}"><i class="bi bi-arrow-left"></i> Back to Sign In</a></p>
  </div>
</div>
{% endblock %}
