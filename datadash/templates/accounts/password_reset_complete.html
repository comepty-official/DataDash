{% extends "base.html" %}
{% block title %}Password Updated{% endblock %}
{% block body_class %}auth-body{% endblock %}
{% block auth_content %}
<div class="auth-wrapper centered">
  <div class="auth-card text-center">
    <div class="auth-icon-circle success"><i class="bi bi-check-circle-fill"></i></div>
    <h2 class="auth-title">Password updated!</h2>
    <p class="auth-subtitle">Your password has been changed successfully. You can now sign in.</p>
    <a href="{% url 'login' %}" class="btn-auth d-block text-center">Go to Sign In <i class="bi bi-arrow-right"></i></a>
  </div>
</div>
{% endblock %}
